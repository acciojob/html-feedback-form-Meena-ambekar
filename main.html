<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<header>Feedback Form</header>
	<form method="post">
		<label for="name">Name</label>
		<input type="text" minlength="3" maxlength="50" id="name" required="Yes">
	</br>
		<label for="portfolio">Portfolio</label>
		<input type="url" id="portfolio" required="Yes">
	</br>
		<label for="favColor">Favorite Color</label>
		<input type="color" id="favColor" required="Yes">
	</br>
		<label for="likeness">Likeness</label>
		<input type="range" id="likeness" min="1" max="100" required="Yes">
	</form>
</body>

</html>
